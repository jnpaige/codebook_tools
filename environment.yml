name: codebook_parsing
channels:
  - conda-forge
  - pytorch
  - nvidia
dependencies:
  # --------------------------------------------------------------------------
  # Core runtime
  # --------------------------------------------------------------------------
  - python=3.11.14
  - pip
  
  # --------------------------------------------------------------------------
  # Numeric / ML foundations (conda-first to avoid binary conflicts)
  # --------------------------------------------------------------------------
  - numpy>=1.24.3,<2.0
  - pytorch::pytorch>=2.4.0
  - pytorch::pytorch-cuda=12.1
  - conda-forge::faiss-gpu=1.8.0  # Install from conda instead of pip
  - PyPDF2==3.0.1
  # --------------------------------------------------------------------------
  # Pip-installed packages
  # --------------------------------------------------------------------------
  - pip:
      
      
      # Embeddings / transformers
      - sentence-transformers>=3.0.0
      - transformers>=4.40.0
      - huggingface-hub>=0.20.0
      
      # LLM / API integration
      - openai==1.3.5
      - requests==2.31.0
      
      # Configuration & utilities
      - PyYAML==6.0.1
      - tqdm==4.66.1